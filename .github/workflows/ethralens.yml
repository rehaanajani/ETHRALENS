name: ETHRALENS Gas Analysis

on:
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write

jobs:
  ethralens:
    name: Smart Contract Economic Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install forge-std
        run: |
          mkdir -p lib
          git clone https://github.com/foundry-rs/forge-std lib/forge-std --depth 1 --quiet

      - name: Debug — raw forge output
        run: forge test --gas-report 2>&1 || true

      - name: Run ETHRALENS Autopilot
        uses: ./                          # Uses the action from THIS repo
        with:
          etherscan_api_key:   ${{ secrets.ETHERSCAN_API_KEY }}
          github_token:        ${{ secrets.GITHUB_TOKEN }}
          openrouter_api_key:  ${{ secrets.OPENROUTER_API_KEY }}
          alchemy_rpc_url:     ${{ secrets.ALCHEMY_RPC_URL }}
          forge_test_path:     '.'
